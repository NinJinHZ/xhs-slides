<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 风格变量 - 根据主题切换 */
        :root {
            --bg-primary: #0a0a0f;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #00d4ff;
            --accent-secondary: #ff006e;
            --gradient-1: linear-gradient(135deg, #00d4ff 0%, #0066ff 100%);
        }

        /* 科技蓝（默认） */
        .style-tech { --bg-primary: #0a0a0f; --text-primary: #ffffff; --text-secondary: #a0a0b0; --accent: #00d4ff; --accent-secondary: #ff006e; --gradient-1: linear-gradient(135deg, #00d4ff 0%, #0066ff 100%); }

        /* 粉紫 */
        .style-pink { --bg-primary: #1a0a1e; --text-primary: #ffffff; --text-secondary: #b0a0b8; --accent: #ff6b9d; --accent-secondary: #c084fc; --gradient-1: linear-gradient(135deg, #ff6b9d 0%, #c084fc 100%); }

        /* 橙红 */
        .style-orange { --bg-primary: #1a0f0a; --text-primary: #ffffff; --text-secondary: #b0a0a0; --accent: #ff9f43; --accent-secondary: #ee5a24; --gradient-1: linear-gradient(135deg, #ff9f43 0%, #ee5a24 100%); }

        /* 暗黑 */
        .style-dark { --bg-primary: #0a0a0a; --text-primary: #ffffff; --text-secondary: #808080; --accent: #ffffff; --accent-secondary: #cccccc; --gradient-1: linear-gradient(135deg, #ffffff 0%, #888888 100%); }

        /* 白底 */
        .style-white { --bg-primary: #ffffff; --text-primary: #000000; --text-secondary: #666666; --accent: #000000; --accent-secondary: #333333; --gradient-1: linear-gradient(135deg, #000000 0%, #444444 100%); }

        /* 金色 */
        .style-gold { --bg-primary: #1a1510; --text-primary: #ffffff; --text-secondary: #b0a090; --accent: #ffd700; --accent-secondary: #ffaa00; --gradient-1: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%); }

        /* 氧气/清新 */
        .style-fresh { --bg-primary: #fdfcfb; --text-primary: #2d3436; --text-secondary: #636e72; --accent: #fd79a8; --accent-secondary: #00cec9; --gradient-1: linear-gradient(135deg, #fd79a8 0%, #a29bfe 50%, #00cec9 100%); }

        /* 商务橙 - 参考一人公司操作系统PDF */
        .style-business { --bg-primary: #fafaf8; --text-primary: #1a1a1a; --text-secondary: #666666; --accent: #ff6b35; --accent-secondary: #ff8c5a; --gradient-1: linear-gradient(135deg, #ff6b35 0%, #ff8c5a 100%); }

        /* 自然绿 - 参考sample文件夹清单风格 */
        .style-nature { --bg-primary: #f8faf5; --text-primary: #1a2e1a; --text-secondary: #4a5d4a; --accent: #2d8a4e; --accent-secondary: #5cb85c; --gradient-1: linear-gradient(135deg, #2d8a4e 0%, #5cb85c 100%); }

        /* 电影 - 参考PPT设计提示词，深色沉浸+流畅动画 */
        .style-cinematic { --bg-primary: #0a0a12; --text-primary: #ffffff; --text-secondary: #a0a0b0; --accent: #ff6b4a; --accent-secondary: #4af0c8; --gradient-1: linear-gradient(135deg, #ff6b4a 0%, #ff9f6b 100%); }

        /* Notion - 简洁工作风 */
        .style-notion { --bg-primary: #ffffff; --text-primary: #37352f; --text-secondary: #9b9a97; --accent: #2eaadc; --accent-secondary: #eb5757; --gradient-1: linear-gradient(135deg, #2eaadc 0%, #4a9eff 100%); }

        /* Apple - 极致简洁 */
        .style-apple { --bg-primary: #ffffff; --text-primary: #1d1d1f; --text-secondary: #86868b; --accent: #0071e3; --accent-secondary: #34c759; --gradient-1: linear-gradient(135deg, #0071e3 0%, #34c759 100%); }

        /* 酸性设计 - Acid Design */
        .style-acid { --bg-primary: #0a0a0f; --text-primary: #ffffff; --text-secondary: #c0c0c0; --accent: #ff00ff; --accent-secondary: #00ffff; --gradient-1: linear-gradient(135deg, #ff00ff 0%, #00ffff 50%, #ffff00 100%); }

        /* 孟菲斯风格 - Memphis */
        .style-memphis { --bg-primary: #ffffff; --text-primary: #1a1a1a; --text-secondary: #666666; --accent: #ff3366; --accent-secondary: #ffcc00; --gradient-1: linear-gradient(135deg, #ff3366 0%, #00ccff 50%, #ffcc00 100%); }

        /* 赛博朋克 - Cyberpunk */
        .style-cyberpunk { --bg-primary: #0d0d1a; --text-primary: #ffffff; --text-secondary: #8888aa; --accent: #ff00ff; --accent-secondary: #00ffff; --gradient-1: linear-gradient(135deg, #ff00ff 0%, #0066ff 100%); }

        /* 蒸汽波 - Vaporwave */
        .style-vaporwave { --bg-primary: #1a0a2e; --text-primary: #ffffff; --text-secondary: #b0a0c0; --accent: #ff71ce; --accent-secondary: #01cdfe; --gradient-1: linear-gradient(135deg, #ff71ce 0%, #01cdfe 50%, #05ffa1 100%); }

        /* 醜萌风格 - Naive */
        .style-naive { --bg-primary: #fff5e6; --text-primary: #2d2d2d; --text-secondary: #666666; --accent: #ff6b6b; --accent-secondary: #4ecdc4; --gradient-1: linear-gradient(135deg, #ff6b6b 0%, #ffe66d 100%); }

        /* Y2K风格 - Retro Futurism */
        .style-y2k { --bg-primary: #1a1a2e; --text-primary: #ffffff; --text-secondary: #a0a0c0; --accent: #00d4ff; --accent-secondary: #ff00ff; --gradient-1: linear-gradient(135deg, #00d4ff 0%, #ff00ff 50%, #ffd700 100%); }

        /* 新粗野主义 - Neo-Brutalism */
        .style-brutal { --bg-primary: #f5f5dc; --text-primary: #000000; --text-secondary: #333333; --accent: #ff0000; --accent-secondary: #0000ff; --gradient-1: linear-gradient(135deg, #ff0000 0%, #ffff00 100%); }

        /* 古典中国风 - Classical Chinese */
        .style-china { --bg-primary: #faf8f5; --text-primary: #2d2d2d; --text-secondary: #666666; --accent: #c41e3a; --accent-secondary: #1e5631; --gradient-1: linear-gradient(135deg, #c41e3a 0%, #d4af37 50%, #1e5631 100%); }

        /* 大胆撞色 - Bold Color Clashing */
        .style-bold { --bg-primary: #0a0a0f; --text-primary: #ffffff; --text-secondary: #c0c0c0; --accent: #ff00ff; --accent-secondary: #ffff00; --gradient-1: linear-gradient(135deg, #ff00ff 0%, #00ffff 100%); }

        /* 欧普艺术 - Op Art */
        .style-opart { --bg-primary: #000000; --text-primary: #ffffff; --text-secondary: #c0c0c0; --accent: #ffffff; --accent-secondary: #ff0000; --gradient-1: linear-gradient(135deg, #ffffff 0%, #ff0000 100%); }

        /* 波普风格 - Pop Art */
        .style-pop { --bg-primary: #ff0066; --text-primary: #ffffff; --text-secondary: #ffe6f2; --accent: #ffff00; --accent-secondary: #00ffff; --gradient-1: linear-gradient(135deg, #ff0066 0%, #ffff00 50%, #00ffff 100%); }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #000;
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: auto;
        }

        .slides-wrapper { display: flex; flex-direction: column; gap: 0; }

        .slide {
            width: 600px;
            height: 800px;
            background: var(--bg-primary);
            /* 竖构图安全边距：左右60px，上下80-120px */
            padding: 80px 60px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* 封面页特殊处理 - 更多顶部留白 */
        .slide-cover {
            padding-top: 120px;
        }

        .slide-content {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 封面内容靠上布局 */
        .slide-cover .slide-content {
            justify-content: flex-start;
            padding-top: 20px;
        }

        .bg-grid { position: absolute; inset: 0; background-image: radial-gradient(circle at 1px 1px, rgba(0,212,255,0.03) 1px, transparent 0); background-size: 25px 25px; pointer-events: none; }

        .bg-glow { position: absolute; width: 150px; height: 150px; border-radius: 50%; filter: blur(60px); opacity: 0.3; pointer-events: none; }
        .bg-glow-1 { top: -30px; right: -30px; background: var(--accent); }
        .bg-glow-2 { bottom: -30px; left: -30px; background: var(--accent-secondary); }

        .line-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); }

        /* 竖构图字体层级 */
        h1 { font-size: 38px; font-weight: 900; margin-bottom: 16px; color: var(--accent); line-height: 1.2; }
        h2 { font-size: 32px; font-weight: 700; margin-bottom: 20px; color: var(--accent); }
        h3 { font-size: 20px; font-weight: 600; margin-bottom: 12px; color: var(--text-primary); }
        p { font-size: 15px; line-height: 1.7; color: var(--text-secondary); }

        .quote { font-size: 15px; font-style: italic; border-left: 3px solid var(--accent); padding-left: 14px; margin-top: 20px; }
        .highlight { color: var(--accent); font-weight: 600; }
        .tagline { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 12px; }

        ul { list-style: none; margin: 16px 0; }
        li { font-size: 14px; color: var(--text-secondary); padding: 6px 0; padding-left: 18px; position: relative; line-height: 1.6; }
        li::before { content: '▸'; position: absolute; left: 0; color: var(--accent); }

        /* 自然绿风格使用勾选符号 */
        .style-nature li::before { content: '✓'; }

        /* 电影风格 - 沉浸式动画 */
        .style-cinematic { --title-size: 48px; --h2-size: 36px; }
        .style-cinematic h1 { font-size: 48px; font-weight: 900; letter-spacing: -1px; }
        .style-cinematic h2 { font-size: 36px; font-weight: 700; }
        .style-cinematic .slide { background: linear-gradient(135deg, #0a0a12 0%, #12121f 100%); }
        .style-cinematic .slide-content { animation: cinematicFade 0.8s ease-out; }
        @keyframes cinematicFade {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .style-cinematic li { transition: transform 0.3s ease; }
        .style-cinematic li:hover { transform: translateX(8px); }

        table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 12px 0; }
        th, td { padding: 6px 8px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { color: var(--accent); font-weight: 600; border-bottom: 2px solid var(--accent); }

        /* 竖构图两列布局 */
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 16px; }

        /* 卡片样式 */
        .col-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px;
        }
        .col-box h3 {
            font-size: 16px;
            margin-bottom: 10px;
        }
        .col-box ul { margin: 0; }
        .col-box li { font-size: 13px; padding: 4px 0; }

        .slide-footer { position: absolute; bottom: 20px; right: 30px; font-size: 11px; color: var(--text-secondary); opacity: 0.4; }
        .center-text { text-align: center; }
    </style>
</head>
<body>
    <div class="slides-wrapper">
        <!-- Slide 1: 封面 -->
        <div class="slide style-tech" id="slide-1">
            <div class="bg-grid"></div>
            <div class="bg-glow bg-glow-1"></div>
            <div class="slide-content">
                <span class="tagline">分类标签</span>
                <h1>标题</h1>
                <p>副标题</p>
                <blockquote class="quote" style="margin-top: 24px;">引言</blockquote>
            </div>
            <div class="slide-footer">01</div>
        </div>

        <!-- Slide 2: 内容页 -->
        <div class="slide style-tech" id="slide-2">
            <div class="bg-grid"></div>
            <div class="slide-content">
                <h2>一级标题</h2>
                <p style="margin-top: 16px;">正文内容...</p>
            </div>
            <div class="slide-footer">02</div>
        </div>
    </div>
</body>
</html>
